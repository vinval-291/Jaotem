      (function() {
        try {
          var activeFetch = window.fetch;
          var defineFetch = function(target) {
            if (!target) return;
            try {
              Object.defineProperty(target, 'fetch', {
                get: function() { return activeFetch; },
                set: function(v) { activeFetch = v; },
                configurable: true,
                enumerable: true
              });
            } catch (e) {}
          };
          defineFetch(window);
          defineFetch(Window.prototype);
          defineFetch(typeof globalThis !== 'undefined' ? globalThis : null);
          defineFetch(typeof self !== 'undefined' ? self : null);
        } catch (e) {
          console.warn("Fetch shim error:", e);
        }
      })();
    </script>
